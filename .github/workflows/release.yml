name: Release

on:
  push:
    tags:
      - "*"

jobs:
  chrome:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Package extension
        run: zip -r "google-docs-case-converter-${{ github.ref_name }}.zip" manifest.json content.js README.md

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: "google-docs-case-converter-${{ github.ref_name }}.zip"
          generate_release_notes: true

  safari:
    needs: chrome
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Convert to Safari Web Extension
        run: |
          xcrun safari-web-extension-converter . \
            --bundle-identifier com.majuscules.docs \
            --app-name MajusculesDocs \
            --swift \
            --force \
            --no-prompt
          mkdir -p MajusculesDocs/MajusculesDocs
          cp manifest.json content.js MajusculesDocs/MajusculesDocs/

      - name: Build Safari extension
        run: |
          SCHEME=$(xcodebuild -list -project MajusculesDocs/MajusculesDocs.xcodeproj \
            | awk '/Schemes:/{found=1; next} found{gsub(/^[[:space:]]+/,""); if(/macOS/){print; exit}}')
          echo "Using scheme: $SCHEME"
          xcodebuild \
            -project MajusculesDocs/MajusculesDocs.xcodeproj \
            -scheme "$SCHEME" \
            -configuration Release \
            -derivedDataPath build \
            ARCHS="x86_64 arm64" \
            ONLY_ACTIVE_ARCH=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Package Safari app
        run: zip -r "majuscules-docs-safari-${{ github.ref_name }}.zip" build/Build/Products/Release/MajusculesDocs.app

      - name: Upload to GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: "majuscules-docs-safari-${{ github.ref_name }}.zip"
