name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Package extension
        run: zip -r "google-docs-case-converter-${{ github.ref_name }}.zip" manifest.json content.js README.md

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: "google-docs-case-converter-${{ github.ref_name }}.zip"
          generate_release_notes: true
